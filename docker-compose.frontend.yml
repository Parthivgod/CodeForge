version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codeforge-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://codeforge-6nhc.onrender.com
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0